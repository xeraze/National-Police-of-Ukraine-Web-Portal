<html lang="uk">
<head>
    <meta charset="UTF-8">

    <style>
        :root {
            --sidebar-width: 280px;
            --bg-dark: #0b0f19;
            --card-bg: #161c2d;
            --accent: #1e88e5;
            --gold: #ffc107;
            --text-white: #f1f5f9;
            --text-gray: #94a3b8;
            --border-style: 1px solid rgba(255, 255, 255, 0.08);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background-color: var(--bg-dark); color: var(--text-white); display: flex; min-height: 100vh; overflow-x: hidden; }

        aside {
            width: var(--sidebar-width);
            background: #0f172a;
            border-right: var(--border-style);
            display: flex;
            flex-direction: column;
            position: fixed;
            height: 100vh;
            z-index: 100;
        }

        .logo-area { padding: 30px 20px; text-align: center; border-bottom: var(--border-style); }
        .logo-area img { width: 80px; margin-bottom: 12px; }
        .logo-area h2 { font-size: 1rem; color: var(--accent); letter-spacing: 1px; font-weight: 800; }

        nav { flex: 1; padding: 20px 15px; overflow-y: auto; }
        .nav-link {
            display: flex; align-items: center; padding: 14px 18px; margin-bottom: 6px;
            color: var(--text-gray); text-decoration: none; border-radius: 10px;
            cursor: pointer; transition: all 0.3s ease; font-weight: 600; font-size: 1rem;
        }
        .nav-link i { width: 30px; font-size: 1.2rem; }
        .nav-link:hover { background: rgba(255, 255, 255, 0.05); color: #fff; }
        .nav-link.active { background: var(--accent); color: #fff; box-shadow: 0 4px 15px rgba(30, 136, 229, 0.3); }

        .footer-brand { padding: 20px; font-size: 0.75rem; color: #475569; border-top: var(--border-style); text-align: center; }

        main { margin-left: var(--sidebar-width); flex: 1; padding: 50px; max-width: 1400px; }

        .hero-section { margin-bottom: 40px; animation: slideIn 0.6s ease-out; }
        .hero-section h1 { font-size: 3rem; font-weight: 800; margin-bottom: 15px; background: linear-gradient(90deg, #fff, #1e88e5); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .hero-section p { font-size: 1.2rem; color: var(--text-gray); max-width: 850px; line-height: 1.7; }

        .info-grid { display: flex; gap: 25px; margin-bottom: 40px; flex-wrap: wrap; }
        .widget {
            background: var(--card-bg); padding: 25px; border-radius: 15px;
            border: var(--border-style); flex: 1; min-width: 300px; max-width: 420px;
            transition: transform 0.3s;
        }
        .widget:hover { transform: translateY(-5px); }
        .widget h3 { color: var(--accent); margin-bottom: 20px; font-size: 1.3rem; display: flex; align-items: center; gap: 12px; }
        .widget ul { list-style: none; }
        .widget li { margin-bottom: 12px; padding-left: 20px; position: relative; font-size: 1.15rem; line-height: 1.4; }
        .widget li::before { content: "•"; color: var(--accent); position: absolute; left: 0; font-size: 1.5rem; top: -2px; }

        .banner-alert {
            background: rgba(255, 193, 7, 0.07); border: 1px solid rgba(255, 193, 7, 0.3);
            padding: 25px; border-radius: 15px; margin-bottom: 45px; border-left: 6px solid var(--gold);
        }
        .banner-alert h4 { color: var(--gold); font-size: 1.2rem; margin-bottom: 8px; text-transform: uppercase; }
        .banner-alert p { font-size: 1.15rem; line-height: 1.5; }

        .rank-item {
            background: var(--card-bg); margin-bottom: 15px; border-radius: 12px;
            padding: 22px 30px; display: flex; align-items: center; gap: 30px;
            border-left: 5px solid var(--accent); transition: 0.3s;
        }
        .rank-item:hover { background: #1e293b; padding-left: 35px; }
        .rank-id { font-weight: 900; font-size: 1.5rem; color: var(--gold); width: 40px; }
        .rank-content { flex: 1; }
        .rank-content h4 { font-size: 1.25rem; margin-bottom: 6px; color: #fff; letter-spacing: 0.5px; }
        .rank-content p { font-size: 1.1rem; color: var(--text-gray); line-height: 1.5; }
        .rank-time { background: #0f172a; padding: 6px 16px; border-radius: 30px; font-size: 0.95rem; font-weight: 700; color: var(--accent); border: 1px solid rgba(30, 136, 229, 0.2); }

        @keyframes slideIn { from { opacity: 0; transform: translateX(-20px); } to { opacity: 1; transform: translateX(0); } }

        @media (max-width: 1100px) {
            aside { width: 90px; }
            aside .nav-link span, aside .logo-area h2, aside .footer-brand { display: none; }
            main { margin-left: 90px; padding: 30px; }
            .widget { max-width: 100%; }
        }
    </style>
</head>

            <div class="hero-section">
                <h1>Автопарк ГУНП</h1>
                <p>Перелік службового транспорту. Використання дозволено згідно зі званням.</p>
            </div>
            <div style="display: flex; flex-direction: column; gap: 15px;">${cardsHtml}</div>`;
    }

    function renderDept(key, element) {
        document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
        element.classList.add('active');
        const d = depts[key];
        const view = document.getElementById('app-view');
        
        let ladderHtml = "";
        
        for (let i = d.start - 1; i < 15; i++) {
            const rankNum = i + 1;
            let reqText = "";

            if (rankNum <= 8) {
                reqText = d.requirements[rankNum] || "Виконання профільних завдань департаменту.";
            } else if (rankNum === 9) {
                reqText = "Наявність вільної посади Заступника начальника департаменту. Вислуга та звіт.";
            } else if (rankNum === 10) {
                reqText = "Наявність вільної посади Начальника департаменту. Довіра вищих за посадою.";
            } else if (rankNum >= 11 && rankNum <= 12) {
                reqText = "Робота виключно з особовим складом та фракційними системами. Призначаються на посаду Апаратом Військової Адміністрації Херсонської області";
            } else {
                reqText = "Строки вислуги не встановлюються. Призначаються на посаду особистим розпорядженням Голови Херсонської ОВА.";
            }

            ladderHtml += `
                <div class="rank-item">
                    <div class="rank-id">${rankNum}</div>
                    <div class="rank-content">
                        <h4>${rankNames[i]}</h4>
                        <p>${reqText}</p>
                    </div>
                    <div class="rank-time">${rankTimes[i]}</div>
                </div>
            `;
        }

        view.innerHTML = `
            <div class="hero-section">
                <h1>${d.title}</h1>
                <p>${d.desc}</p>
            </div>
            <div class="info-grid">
                <div class="widget">
                    <h3><i class="fa-solid fa-list-check"></i> Основні функції</h3>
                    <ul>${d.funcs.map(f => `<li>${f}</li>`).join('')}</ul>
                </div>
                <div class="widget">
                    <h3><i class="fa-solid fa-handcuffs"></i> Повноваження</h3>
                    <ul>${d.rights.map(r => `<li>${r}</li>`).join('')}</ul>
                </div>
            </div>
            <div class="banner-alert">
                <h4>Унікальна особливість</h4>
                <p>${d.special}</p>
            </div>
            <h2 style="margin-bottom: 25px; font-weight: 800; font-size: 1.8rem;">Сходи звань та вимоги підвищення</h2>
            <div class="ladder-container">${ladderHtml}</div>
        `;
    }

    const navMenu = document.getElementById('menu-items');
    Object.keys(depts).forEach(key => {
        const item = document.createElement('div');
        item.className = 'nav-link';
        item.innerHTML = `<i class="fa-solid ${depts[key].icon}"></i> <span>${key}</span>`;
        item.onclick = () => renderDept(key, item);
        navMenu.appendChild(item);
    });

    renderHome();
</script>
</body>
</html>
